name: Ejecutar Scraper Diario

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Copiar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar el script
      run: python wsj_to_sheets.py
