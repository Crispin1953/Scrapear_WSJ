name: Ejecutar Scraper Diario

on:
  schedule:
    # Se ejecuta de lunes a viernes a las 21:30 UTC (Ajusta según tu zona horaria)
    # 21:30 UTC equivale a las 23:30 de España o 17:30 de Nueva York (cierre de mercado)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Esto te permite también ejecutarlo manualmente con un botón

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Copiar el código del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python en el servidor
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar el script
      run: python wsj_to_sheets.py
