name: Scraper Diario

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Copiar codigo de GitHub
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. LISTAR ARCHIVOS (Diagnostico)
        run: |
          echo "=== Los archivos reales en el servidor son: ==="
          ls -R

      - name: 4. Instalar librerias
        run: pip install requests gspread oauth2client

      - name: 5. Ejecutar el script
        run: python wsj_to_sheets.py
